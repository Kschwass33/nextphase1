<script>
function toggleSvc(btn){
  var card=btn.closest('.svc');
  var isOpen=card.classList.contains('open');
  btn.closest('.services-col').querySelectorAll('.svc.open').forEach(function(s){s.classList.remove('open')});
  if(!isOpen)card.classList.add('open');
}

var observer=new IntersectionObserver(function(entries){
  entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('visible')});
},{threshold:0.1});
document.querySelectorAll('.reveal').forEach(function(el){observer.observe(el)});


// ======================
// ✅ FLIP FIX
// ======================
document.querySelectorAll('.flip-card').forEach(function(card){
  card.addEventListener('click', function(e){
    if(e.target.closest('.flip-back-cta')) return;
    card.classList.toggle('flipped');
  });
});


// ======================
// ✅ CTA SMART SCROLL
// ======================
document.querySelectorAll('.flip-back-cta').forEach(function(btn){
  btn.addEventListener('click', function(e){
    e.stopPropagation();

    var targetId = btn.getAttribute('data-target');
    var targetEl = document.getElementById(targetId);

    if(targetEl){
      targetEl.scrollIntoView({
        behavior: 'smooth',
        block: 'start'
      });

      // subtle highlight
      targetEl.style.transition = "box-shadow 0.4s ease";
      targetEl.style.boxShadow = "0 0 0 2px rgba(201,168,76,0.5)";
      setTimeout(function(){ targetEl.style.boxShadow = "none"; }, 1200);
    }
  });
});


// ======================
// (UNCHANGED) HEIGHT FIX
// ======================
function sendHeight(){
  var h=document.documentElement.scrollHeight;
  window.parent.postMessage({type:'setHeight',height:h},'*')
}
window.addEventListener('load',sendHeight);
window.addEventListener('resize',sendHeight);
setTimeout(sendHeight,500);
setTimeout(sendHeight,1500);
</script>
